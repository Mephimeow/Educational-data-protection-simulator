services:
  postgres_go:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: cyberuser
      POSTGRES_PASSWORD: cyberpass
      POSTGRES_DB: cyberdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    networks:
      - app-network

  postgres_java:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: db_java
    volumes:
      - postgres_java_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d db_java"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

  backend_go:
    build: ./backend
    ports:
      - "8010:8000"
    environment:
      - DB_HOST=postgres_go
      - DB_USER=cyberuser
      - DB_PASSWORD=cyberpass
      - DB_NAME=cyberdb
      - DB_PORT=5432
    depends_on:
      - postgres_go
      - redis
    networks:
      - app-network

  app:
    build: ./backendJava
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres_java:5432/db_java
      - SPRING_DATASOURCE_USERNAME=myuser
      - SPRING_DATASOURCE_PASSWORD=mypassword
      - JWT_SECRET=${JWT_SECRET:-defaultSecretKeyForDevelopment123456789}
    depends_on:
      postgres_java:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend_go:8010
    depends_on:
      - backend_go
    networks:
      - app-network

  sandbox-phishing:
    build: ./sandbox/phishing
    ports:
      - "9081:80"
    networks:
      - app-network
    restart: unless-stopped

  sandbox-email:
    build: ./sandbox/email-client
    ports:
      - "9082:80"
    networks:
      - app-network
    restart: unless-stopped

  sandbox-wifi:
    build: ./sandbox/wifi-hotspot
    ports:
      - "9083:80"
    networks:
      - app-network
    restart: unless-stopped

  sandbox-social:
    build: ./sandbox/social-network
    ports:
      - "9084:80"
    networks:
      - app-network
    restart: unless-stopped

  sandbox-atm:
    build: ./sandbox/atm-simulator
    ports:
      - "9085:80"
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  postgres_java_data:
