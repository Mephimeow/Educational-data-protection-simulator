services:
  postgres_go:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: cyberuser
      POSTGRES_PASSWORD: cyberpass
      POSTGRES_DB: cyberdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend_go:
    build: ./backend
    ports:
      - "8001:8000"
    environment:
      - DB_HOST=postgres
      - DB_USER=cyberuser
      - DB_PASSWORD=cyberpass
      - DB_NAME=cyberdb
      - DB_PORT=5432
    depends_on:
      - postgres_go
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend_go

  postgres_java:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: myuser
#      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD var is required in .env file}
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: db_java
    volumes:
      - postgres_java_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U pharmacy_app -d pharmacy_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    env_file:
      - ./backendJava/.env
    build: ./backendJava
    container_name: backend_java
    depends_on:
      postgres_java:
        condition: service_healthy
    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5434/db_java
      SPRING_DATASOURCE_USERNAME: myuser

volumes:
  postgres_data:
  redis_data:
  postgres_java_data: